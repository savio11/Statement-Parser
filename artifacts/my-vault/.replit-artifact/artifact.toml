kind = "mobile"
previewPath = "/"
title = "My Vault"
version = "1.0.0"
id = "artifacts/my-vault"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21030

[services.development]
run = "pnpm --filter @workspace/my-vault run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/my-vault", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/my-vault", "run", "serve" ]

[services.env]
PORT = "21030"
BASE_PATH = "/"
